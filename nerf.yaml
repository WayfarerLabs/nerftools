# Nerf config for the nerftools repo.
# Used by `nerf generate --target claude-plugin -c nerf.yaml`.

package:
  name: nerftools
  version: 1.0.0 # x-release-please-version
  description: Scoped, safety-constrained CLI wrappers for AI agents
  author:
    name: WayfarerLabs
  homepage: https://github.com/WayfarerLabs/nerftools
  repository: https://github.com/WayfarerLabs/nerftools
  license: MIT
  keywords:
    - claude-code
    - agent-tools
    - safety
    - cli-wrappers

targets:
  claude-plugin:
    marketplace:
      embed: false  # distributed via the repo-level marketplace.json
