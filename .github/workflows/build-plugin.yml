name: Build Claude Plugin

on:
  push:
    branches: [main]
    paths:
      - "nerftools/**"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build Claude Code plugin
        run: uv run nerf generate --target claude-plugin --outdir ./dist/claude-plugin

      - name: Check for changes
        id: diff
        run: |
          git add dist/claude-plugin/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated plugin
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build: regenerate Claude Code plugin"
          git push
