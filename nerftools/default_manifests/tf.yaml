version: 1

package:
  name: tf
  description: Terraform workflow tools for formatting and static validation
  skill_group: tf
  skill_intro: |
    These tools run Terraform commands in the current directory. They cover
    canonical HCL formatting via `terraform fmt` and static configuration
    checks via `terraform validate`. Planning and applying for this codebase
    are done through Terragrunt (see the tg-* tools).
  bash_hints:
    - '\bterraform\b'

tools:
  tf-fmt:
    description: >-
      Run terraform fmt to canonically format Terraform files. Operates on
      the current directory by default; pass a target directory positionally
      to format elsewhere under the workspace.
    threat:
      read: workspace
      write: workspace
    template:
      command: [terraform, fmt, "{{switches.check}}", "{{switches.recursive}}", "{{switches.diff}}", "{{arguments.directory}}"]
    switches:
      check:
        description: Check formatting without modifying files (exits non-zero if files are unformatted)
        flag: -check
      recursive:
        description: Process files in subdirectories
        flag: -recursive
      diff:
        description: Display diffs of formatting changes
        flag: -diff
    arguments:
      directory:
        description: Subdirectory of the workspace to format (default current)
        required: false
        path_tests: [under_cwd]

  tf-validate:
    description: >-
      Run terraform validate to check syntactic validity and internal
      consistency of the configuration in the current directory. Static
      checks only -- does not access remote state or provider APIs.
      Requires an initialized working directory (run `terraform init` or
      the tg-init tool first).
    threat:
      read: workspace
      write: none
    template:
      command: [terraform, validate, "{{switches.json}}", "{{switches.no_tests}}"]
    switches:
      json:
        description: Produce output in a machine-readable JSON format
        flag: -json
      no_tests:
        description: Skip validating .tftest.hcl test files
        flag: -no-tests
