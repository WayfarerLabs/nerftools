version: 1

package:
  name: az-pipelines
  description: Azure Pipelines tools for viewing pipeline status and run history
  skill_group: az-pipelines
  skill_intro: |
    These tools query Azure Pipelines. The organization and project are
    auto-detected from the git remote. Use az-pipelines-list to see all
    pipelines, az-pipelines-runs to see recent runs across all pipelines,
    and az-pipelines-check to inspect a specific pipeline with its recent
    run history.

tools:
  az-pipelines-list:
    description: List all pipelines in the Azure DevOps project
    threat:
      read: remote
      write: none
    template:
      command: [az, pipelines, list, --output, json]

  az-pipelines-runs:
    description: List the 20 most recent pipeline runs across all pipelines
    threat:
      read: remote
      write: none
    template:
      command: [az, pipelines, runs, list, --top, "20", --output, json]

  az-pipelines-check:
    description: Show details and the 10 most recent runs for a specific pipeline (by ID)
    threat:
      read: remote
      write: none
    template:
      command: [az, pipelines, runs, list, --pipeline-ids, "{{arguments.pipeline_id}}", --top, "10", --output, json]
    arguments:
      pipeline_id:
        description: Pipeline ID (numeric, from az-pipelines-list)
        required: true
        pattern: "^[0-9]+$"
