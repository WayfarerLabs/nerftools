        - private-dns
        - zone
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Private DNS zone name (e.g. privatelink.vaultcore.azure.net)
        required: true
    options:
      resource_group:
        description: Resource group containing the zone
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-dns-record-list:
    description: List record sets in a private DNS zone (all record types)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - private-dns
        - record-set
        - list
        - --resource-group
        - "{{options.resource_group}}"
        - --zone-name
        - "{{arguments.zone_name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      zone_name:
        description: Private DNS zone name
        required: true
    options:
      resource_group:
        description: Resource group containing the zone
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-dns-link-list:
    description: List virtual network links on a private DNS zone
    threat:
      read: remote
