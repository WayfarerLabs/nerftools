        - "{{options.resource_group}}"
        - "{{options.subscription}}"
        - --output
        - json
    options:
      resource_group:
        description: Filter to a specific resource group
        flag: --resource-group
        short: -g
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-endpoint-show:
    description: Show private endpoint details (target resource, connection state, NIC)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - private-endpoint
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Private endpoint name
        required: true
    options:
      resource_group:
        description: Resource group containing the private endpoint
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-link-resource-list:
    description: List groupIds a resource exposes for private endpoints (e.g. vault, sqlServer)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - private-link-resource
        - list
        - --id
        - "{{arguments.resource_id}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      resource_id:
        description: Full resource ID of the target resource
        required: true
    options:
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-dns-zone-list:
