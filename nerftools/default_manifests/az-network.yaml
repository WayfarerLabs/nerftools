version: 1

package:
  name: az-network
  description: Azure networking inspection tools (VNets, peerings, NSGs, private endpoints, DNS zones)
  skill_group: az-network
  skill_intro: |
    Tools for inspecting Azure networking resources: VNets, peerings, subnets,
    NSGs, private endpoints, private DNS zones, public IPs, NICs, and route
    tables. Use these during validation phases to confirm resources are
    configured for private access and that public surface is minimized.
    All tools accept --subscription to target a specific subscription.

tools:
  az-network-vnet-list:
    description: List virtual networks (optionally filtered by resource group)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - vnet
        - list
        - "{{options.resource_group}}"
        - "{{options.subscription}}"
        - --output
        - json
    options:
      resource_group:
        description: Filter to a specific resource group
        flag: --resource-group
        short: -g
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-vnet-show:
    description: Show details for a virtual network (address space, subnets, peerings)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - vnet
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: VNet name
        required: true
    options:
      resource_group:
        description: Resource group containing the VNet
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-vnet-peering-list:
    description: List peerings on a virtual network
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - vnet
        - peering
        - list
        - --resource-group
        - "{{options.resource_group}}"
        - --vnet-name
        - "{{arguments.vnet_name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      vnet_name:
        description: VNet name
        required: true
    options:
      resource_group:
        description: Resource group containing the VNet
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-vnet-peering-show:
    description: Show details for a single VNet peering (peering state, address space, gateway transit)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - vnet
        - peering
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --vnet-name
        - "{{options.vnet_name}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Peering name
        required: true
    options:
      resource_group:
        description: Resource group containing the VNet
        flag: --resource-group
        short: -g
        required: true
      vnet_name:
        description: VNet that owns the peering
        flag: --vnet-name
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-subnet-show:
    description: Show subnet details (delegations, private link policies, NSG/RT bindings)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - vnet
        - subnet
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --vnet-name
        - "{{options.vnet_name}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Subnet name
        required: true
    options:
      resource_group:
        description: Resource group containing the VNet
        flag: --resource-group
        short: -g
        required: true
      vnet_name:
        description: VNet that owns the subnet
        flag: --vnet-name
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-nsg-list:
    description: List network security groups (optionally filtered by resource group)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - nsg
        - list
        - "{{options.resource_group}}"
        - "{{options.subscription}}"
        - --output
        - json
    options:
      resource_group:
        description: Filter to a specific resource group
        flag: --resource-group
        short: -g
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-nsg-show:
    description: Show NSG details including all security rules
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
        - nsg
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: NSG name
        required: true
    options:
      resource_group:
        description: Resource group containing the NSG
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-network-private-endpoint-list:
    description: List private endpoints (optionally filtered by resource group)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - network
