version: 1

package:
    name: stdutils
    description: Safe wrappers for common Unix utilities
    skill_group: stdutils
    skill_intro: |
        These tools wrap standard Unix utilities with safety guardrails.
        Use find and find-cwd for file discovery without code execution
        capabilities. Use grep and grep-recursive-cwd for text search.
        Use print-range to extract a numeric line range from a file or
        stream. find-cwd, grep-recursive-cwd, and print-range-cwd are
        pre-scoped to the current directory.

        General-purpose sed and awk are intentionally NOT wrapped --
        their full surface area (in-place edits, shell-out via the `e`
        command, arbitrary file writes via `w`) makes them dangerous to
        permission broadly. Only the line-range filtering idiom is
        covered, via print-range. If you have a sed/awk need that
        print-range and grep don't cover, file a `nerf-report` so a
        tightly-scoped wrapper can be added.

        Note: the bash-hint redirect catches the most common forms
        (`sed -n 'N,Mp'`, `sed --quiet 'N,Mp'`, `awk 'NR>=N && NR<=M'`,
        `awk 'NR>N'`). Less common variants like `sed -nq '1,5p'` or
        `sed -n -e '1,5p'` may not trigger the redirect; nothing wrong
        with using them, but consider print-range / print-range-cwd
        first.
    bash_hints:
        # sed line-address print: `sed -n '1,2p'`, `sed -n 5p`,
        # `sed -n '$p'`, plus the --quiet long-form. Address must be
        # entirely digits, commas, or `$` so that `/regex/p` and
        # `s/foo/bar/` invocations don't fire.
        - '\bsed +(-n|--quiet) +[''"]?[0-9$,]+p\b'
        # awk filtering on record number: `awk 'NR>=1'`, `awk 'NR==42'`,
        # `awk 'NR>5'`. The NR-followed-by-comparison-operator-followed-by-
        # digit signature catches line-range filtering; column extraction
        # and other awk uses don't match. No trailing \b after NR because
        # the translated boundary consumes a char and would prevent
        # matching single-char operators like `NR>5`.
        - '\bawk\b.*\bNR *[<>=!]+ *[0-9]'

tools:
    find:
        description: >-
            Search for files and directories. Exec-like actions are denied --
            use this for discovery only, not for running commands on results.
        threat:
            read: machine
            write: none
        requires: [find]
        passthrough:
            command: find
            deny: [-exec, -execdir, -ok, -okdir, -delete]

    find-cwd:
        description: >-
            Search for files and directories under the current directory. Exec-like
            actions are denied. The search root is always '.' (current directory).
        threat:
            read: workspace
            write: none
        requires: [find]
        passthrough:
            command: find
            deny: [-exec, -execdir, -ok, -okdir, -delete]
            prefix: [.]

    grep-recursive-cwd:
        description: >-
            Search for a pattern recursively in the current directory. Prints
            matching lines with filenames and line numbers.
        threat:
            read: workspace
            write: none
        requires: [grep]
        template:
            command:
                - grep
                - -r
                - -n
                - "{{switches.ignore_case}}"
                - "{{switches.line_regexp}}"
                - "{{switches.word_regexp}}"
                - "{{switches.count}}"
                - "{{switches.files_with_matches}}"
                - "{{options.include}}"
                - "{{options.exclude}}"
                - --
                - "{{arguments.pattern}}"
                - .
        switches:
            ignore_case:
                description: Case-insensitive matching
                flag: --ignore-case
                short: -i
            line_regexp:
                description: Match whole lines only
                flag: --line-regexp
                short: -x
            word_regexp:
                description: Match whole words only
                flag: --word-regexp
                short: -w
            count:
                description: Print only a count of matching lines per file
                flag: --count
                short: -c
            files_with_matches:
                description: Print only filenames containing matches
                flag: --files-with-matches
                short: -l
        options:
            include:
                description: Search only files matching this glob (e.g. '*.py')
                flag: --include
                repeatable: true
            exclude:
                description: Skip files matching this glob (e.g. '*.log')
                flag: --exclude
                repeatable: true
        arguments:
            pattern:
                description: Regular expression pattern to search for
                required: true

    grep:
        description: >-
            Search for a pattern in files or directories. Supports recursive search
            via -r. Files and directories are specified as trailing positional
            arguments after the pattern.
        threat:
            read: machine
            write: none
        requires: [grep]
        template:
            command:
                - grep
                - -n
                - "{{switches.recursive}}"
                - "{{switches.ignore_case}}"
                - "{{switches.line_regexp}}"
                - "{{switches.word_regexp}}"
                - "{{switches.count}}"
                - "{{switches.files_with_matches}}"
                - "{{options.include}}"
                - "{{options.exclude}}"
                - --
                - "{{arguments.pattern}}"
                - "{{arguments.paths}}"
        switches:
            recursive:
                description: Search directories recursively
                flag: --recursive
                short: -r
            ignore_case:
                description: Case-insensitive matching
                flag: --ignore-case
                short: -i
            line_regexp:
                description: Match whole lines only
                flag: --line-regexp
                short: -x
            word_regexp:
                description: Match whole words only
                flag: --word-regexp
                short: -w
            count:
                description: Print only a count of matching lines per file
                flag: --count
                short: -c
            files_with_matches:
                description: Print only filenames containing matches
                flag: --files-with-matches
                short: -l
        options:
            include:
                description: Search only files matching this glob (e.g. '*.py')
                flag: --include
                repeatable: true
            exclude:
                description: Skip files matching this glob (e.g. '*.log')
                flag: --exclude
                repeatable: true
        arguments:
            pattern:
                description: Regular expression pattern to search for
                required: true
            paths:
                description: Files or directories to search
                required: true
                variadic: true

    print-range:
        description: >-
            Print a line range from a file or stdin. <start> and <end> are
            1-indexed inclusive line numbers; both are required. With no
            <file>, reads from stdin (so this works at the end of a
            pipeline). For workspace-scoped reads, use print-range-cwd
            instead. For "lines matching X" rather than a line range,
            use grep.
        threat:
            # Mirrors grep: machine-readable paths via positional arg.
            # Workspace-scoped reads have their own tool (print-range-cwd).
            read: machine
            write: none
        requires: [sed]
        template:
            # sed (not awk) for the implementation: avoids awk's var=val
            # argv-parsing gotcha (a filename like `foo=bar.txt` would be
            # treated as an assignment instead of a file), and keeps the
            # tool in template mode. The trailing `Nq` quits after <end>
            # so huge files aren't read past the requested range.
            # <start> and <end> are validated to ^[1-9][0-9]*$, so the
            # rendered sed program is pure digits -- no script injection.
            command:
                - sed
                - -n
                - "{{arguments.start}},{{arguments.end}}p; {{arguments.end}}q"
                - "{{arguments.file}}"
        arguments:
            start:
                description: First line number (1-indexed, inclusive)
                required: true
                pattern: "^[1-9][0-9]*$"
            end:
                description: Last line number (1-indexed, inclusive)
                required: true
                pattern: "^[1-9][0-9]*$"
            file:
                description: File to read (omit to read from stdin)
                required: false

    print-range-cwd:
        description: >-
            Print a line range from a workspace file. Like print-range, but
            <file> is required and must resolve under the current directory
            (workspace-scoped read). Use this when you specifically want to
            read a file in the repo; use print-range for machine-scope reads
            or for filtering a piped stream.
        threat:
            read: workspace
            write: none
        requires: [sed]
        template:
            # Same implementation rationale as print-range above.
            command:
                - sed
                - -n
                - "{{arguments.start}},{{arguments.end}}p; {{arguments.end}}q"
                - "{{arguments.file}}"
        arguments:
            start:
                description: First line number (1-indexed, inclusive)
                required: true
                pattern: "^[1-9][0-9]*$"
            end:
                description: Last line number (1-indexed, inclusive)
                required: true
                pattern: "^[1-9][0-9]*$"
            file:
                description: File to read (must be under the current directory)
                required: true
                path_tests: [under_cwd]
