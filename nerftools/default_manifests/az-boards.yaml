version: 1

package:
  name: az-boards
  description: Azure Boards work item tools for querying, viewing, creating, and updating work items
  skill_group: az-boards
  skill_intro: |
    These tools interact with Azure Boards work items. The organization and
    project are auto-detected from the git remote; pass --project to target
    a different project in the same org. The az-boards-wi-* tools operate
    on any work item. The az-boards-mywi-* tools are scoped to work items
    assigned to you. az-boards-area-list lists area paths in a project,
    useful for setting --area on create/update.

tools:
  az-boards-wi-list:
    description: >-
      Query work items using WIQL (Work Item Query Language). Returns matching
      work items as JSON. The organization and project are auto-detected from
      the git remote; pass --project to override.
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - boards
        - query
        - --wiql
        - "{{arguments.wiql}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      wiql:
        description: >-
          WIQL query string (e.g. "SELECT [System.Id], [System.Title],
          [System.State] FROM WorkItems WHERE [System.AssignedTo] = @Me
          AND [System.State] <> 'Closed' ORDER BY [System.ChangedDate] DESC")
        required: true
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-wi-show:
    description: Show details and comments for any work item.
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - boards
        - work-item
        - show
        - --id
        - "{{arguments.wi_id}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      wi_id:
        description: Work item ID (numeric)
        required: true
        pattern: "^[0-9]+$"
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-wi-comment:
    description: Add a comment to any work item.
    threat:
      read: remote
      write: remote
    template:
      command:
        - az
        - boards
        - work-item
        - update
        - --id
        - "{{arguments.wi_id}}"
        - --discussion
        - "{{arguments.comment}}"
        - "{{options.project}}"
        - --output
        - none
    arguments:
      wi_id:
        description: Work item ID (numeric)
        required: true
        pattern: "^[0-9]+$"
      comment:
        description: >-
          Comment text. Stored as HTML on the work item, so HTML markup
          renders (e.g. "<p>See <a href='...'>this</a></p>"). Plain text
          is stored verbatim and renders as-is.
        required: true
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-wi-update:
    description: >-
      Update fields on a work item. Supports state, title, assigned-to, area,
      iteration, and adding a discussion comment. Returns the updated work item
      as JSON.
    threat:
      read: remote
      write: remote
    template:
      command:
        - az
        - boards
        - work-item
        - update
        - --id
        - "{{arguments.wi_id}}"
        - "{{options.state}}"
        - "{{options.title}}"
        - "{{options.assigned_to}}"
        - "{{options.area}}"
        - "{{options.iteration}}"
        - "{{options.discussion}}"
        - "{{options.fields}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      wi_id:
        description: Work item ID (numeric)
        required: true
        pattern: "^[0-9]+$"
    options:
      state:
        description: New state (e.g. Active, Resolved, Closed)
        flag: --state
      title:
        description: New title
        flag: --title
      assigned_to:
        description: Person to assign to (e.g. user@example.com)
        flag: --assigned-to
      area:
        description: Area path (e.g. MyProject\MyArea)
        flag: --area
      iteration:
        description: Iteration path (e.g. MyProject\Sprint 1)
        flag: --iteration
      discussion:
        description: >-
          Comment to add to the work item discussion. Stored as HTML, so
          HTML markup renders; plain text renders as-is.
        flag: --discussion
      fields:
        description: "Custom field assignment (e.g. \"System.Tags=Rock\")"
        flag: --fields
        short: -f
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-wi-create:
    description: >-
      Create a new work item. Requires a type and title. Optionally set
      assigned-to, area, iteration, description, and a discussion comment.
      Returns the created work item as JSON.
    threat:
      read: remote
      write: remote
    template:
      command:
        - az
        - boards
        - work-item
        - create
        - --type
        - "{{arguments.type}}"
        - --title
        - "{{arguments.title}}"
        - "{{options.assigned_to}}"
        - "{{options.area}}"
        - "{{options.iteration}}"
        - "{{options.description}}"
        - "{{options.discussion}}"
        - "{{options.fields}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      type:
        description: Work item type (e.g. Bug, Task, User Story, Feature)
        required: true
      title:
        description: Title of the work item
        required: true
    options:
      assigned_to:
        description: Person to assign to (e.g. user@example.com)
        flag: --assigned-to
      area:
        description: Area path (e.g. MyProject\MyArea)
        flag: --area
      iteration:
        description: Iteration path (e.g. MyProject\Sprint 1)
        flag: --iteration
      description:
        description: >-
          Description of the work item. Stored as HTML, so HTML markup
          renders (e.g. "<p>Steps:</p><ol><li>...</li></ol>"). Plain
          text is stored verbatim and renders as-is.
        flag: --description
        short: -d
      discussion:
        description: >-
          Comment to add to the work item discussion. Stored as HTML, so
          HTML markup renders; plain text renders as-is.
        flag: --discussion
      fields:
        description: "Custom field assignment (e.g. \"System.Tags=Rock\")"
        flag: --fields
        short: -f
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-wi-add-parent:
    description: >-
      Set the parent of a work item. Takes the child ID and parent ID as
      positional arguments. Idempotent if the link already exists.
    threat:
      read: remote
      write: remote
    template:
      command:
        - az
        - boards
        - work-item
        - relation
        - add
        - --id
        - "{{arguments.child_id}}"
        - --relation-type
        - parent
        - --target-id
        - "{{arguments.parent_id}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      child_id:
        description: Work item ID of the child (numeric)
        required: true
        pattern: "^[0-9]+$"
      parent_id:
        description: Work item ID of the parent (numeric)
        required: true
        pattern: "^[0-9]+$"
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-mywi-show:
    description: Show details and comments for a work item assigned to you.
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - boards
        - work-item
        - show
        - --id
        - "{{arguments.wi_id}}"
        - "{{options.project}}"
        - --output
        - json
    arguments:
      wi_id:
        description: Work item ID (numeric, must be assigned to you)
        required: true
        pattern: "^[0-9]+$"
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-mywi-comment:
    description: Add a comment to a work item assigned to you.
    threat:
      read: remote
      write: remote
    template:
      command:
        - az
        - boards
        - work-item
        - update
        - --id
        - "{{arguments.wi_id}}"
        - --discussion
        - "{{arguments.comment}}"
        - "{{options.project}}"
        - --output
        - none
    arguments:
      wi_id:
        description: Work item ID (numeric, must be assigned to you)
        required: true
        pattern: "^[0-9]+$"
      comment:
        description: >-
          Comment text. Stored as HTML on the work item, so HTML markup
          renders (e.g. "<p>See <a href='...'>this</a></p>"). Plain text
          is stored verbatim and renders as-is.
        required: true
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p

  az-boards-area-list:
    description: >-
      List area paths configured in a project. Returns the hierarchical area
      tree as JSON. Useful for setting --area on az-boards-wi-create or
      az-boards-wi-update.
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - boards
        - area
        - project
        - list
        - "{{options.project}}"
        - --output
        - json
    options:
      project:
        description: Azure DevOps project name or ID (auto-detected from the git remote if omitted)
        flag: --project
        short: -p
