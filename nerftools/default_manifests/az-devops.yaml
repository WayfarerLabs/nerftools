version: 1

package:
  name: az-devops
  description: Azure DevOps organization-level configuration tools
  skill_group: az-devops
  skill_intro: |
    Tools for configuring Azure DevOps defaults that apply across the
    az-boards, az-pipelines, and az-repos packages. Use
    az-devops-set-default-project when the git-remote-detected project
    is not the one you want to operate on by default.

tools:
  az-devops-set-default-project:
    description: >-
      Set the default Azure DevOps project for subsequent az boards,
      az pipelines, and az repos commands. Persists to the user's az
      config (~/.azure). Useful when the git remote's project is not
      the project you want to operate on by default.
    threat:
      read: none
      write: machine
    template:
      command:
        - az
        - devops
        - configure
        - --defaults
        - "project={{arguments.project}}"
    arguments:
      project:
        description: Project name or ID to set as the default
        required: true
