version: 1

package:
  name: az-postgres
  description: Azure Database for PostgreSQL Flexible Server inspection tools
  skill_group: az-postgres
  skill_intro: |
    Tools for inspecting PostgreSQL Flexible Server configuration.
    az-postgres-flexible-server-show reports the network block, including
    delegated subnet, private DNS zone association, and public access
    setting. Use during private-networking validation to confirm the
    server is correctly attached to its private endpoint topology.
    All tools accept --subscription to target a specific subscription.

tools:
  az-postgres-flexible-server-list:
    description: List PostgreSQL Flexible Servers (optionally filtered by resource group)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - postgres
        - flexible-server
        - list
        - "{{options.resource_group}}"
        - "{{options.subscription}}"
        - --output
        - json
    options:
      resource_group:
        description: Filter to a specific resource group
        flag: --resource-group
        short: -g
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-postgres-flexible-server-show:
    description: Show PostgreSQL Flexible Server details (network block, SKU, version, HA)
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - postgres
        - flexible-server
        - show
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Server name
        required: true
    options:
      resource_group:
        description: Resource group containing the server
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription

  az-postgres-flexible-server-firewall-rule-list:
    description: List firewall rules on a PostgreSQL Flexible Server
    threat:
      read: remote
      write: none
    template:
      command:
        - az
        - postgres
        - flexible-server
        - firewall-rule
        - list
        - --resource-group
        - "{{options.resource_group}}"
        - --name
        - "{{arguments.name}}"
        - "{{options.subscription}}"
        - --output
        - json
    arguments:
      name:
        description: Server name
        required: true
    options:
      resource_group:
        description: Resource group containing the server
        flag: --resource-group
        short: -g
        required: true
      subscription:
        description: Subscription name or ID (defaults to active)
        flag: --subscription
